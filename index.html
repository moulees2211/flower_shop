<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naveen Flower Shop</title>
    <link rel="icon" href="OIP.webp" type="image/webp">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="header-content">
                <h1><img src="OIP.webp" alt="Shop Logo" class="shop-logo" id="display-shop-logo"> <span id="display-shop-name">Naveen Flower Shop</span></h1>
                <p id="display-shop-desc">Browse our beautiful flower collections</p>
                <a href="login.html" style="color: var(--primary-color); text-decoration: none; margin-top: 10px; display: inline-block; font-weight: 500;"><i class="fa-solid fa-lock"></i> Admin Login</a>
            </div>
        </header>

        <div class="categories-container">
            <div class="categories-header">
                <button id="categories-toggle" class="hamburger-btn">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <h3 id="current-category-title">All Products</h3>
            </div>
            <div class="categories-dropdown" id="categories-dropdown">
                <ul id="categories-list">
                    <li class="category-item active" data-id="all">All Products</li>
                    <!-- Categories will be dynamically generated here -->
                </ul>
            </div>
        </div>

        <main>
            <div class="products-grid" id="products-grid">
                <!-- Products will be dynamically generated here -->
            </div>
        </main>
    </div>
    
    <!-- Lightbox Modal -->
    <div id="lightbox-modal" class="lightbox">
        <span class="close-lightbox">&times;</span>
        <img class="lightbox-content" id="lightbox-img">
        <a class="lightbox-prev">&#10094;</a>
        <a class="lightbox-next">&#10095;</a>
        <div class="lightbox-thumbnails" id="lightbox-thumbnails"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
